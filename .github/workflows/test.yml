name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties

      - name: Fix Chaquopy Python path for CI
        run: |
          sed -i 's|buildPython("D:/Programs/Python/Python38/python.exe")|buildPython("python3")|' pyramid/build.gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK with Gradle
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_on: error
          command: ./gradlew assembleRelease --build-cache --parallel --daemon --warning-mode all

      - name: Prepare APKs
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find ${{ github.workspace }}/app/build/outputs/apk -name "*.apk" -exec mv {} ${{ github.workspace }}/apk/ \;

      - name: Upload APKs to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-APKs
          path: ${{ github.workspace }}/apk/*.apk
          retention-days: 7
